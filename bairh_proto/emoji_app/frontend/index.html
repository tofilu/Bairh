<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji-Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Fira Code", Consolas, monospace;
    background: #f5f5f5;
    padding: 30px;
  }
  .page-title {
    text-align: center;
    margin-bottom: 30px;
    font-size: 1.8rem;
  }
  .page-wrapper {
    max-width: 900px;
    margin: 0 auto;
  }
  .main-container {
    display: flex;
    width: 100%;
    gap: 5%;
    justify-content: space-between;
  }
  .left-container,
  .right-container {
    width: 42%;
    height: 320px;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
  }
  .left-container textarea {
    flex: 1;
    width: 100%;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    font-family: "Fira Code", Consolas, monospace;
    font-size: 16px;
    box-sizing: border-box;
    resize: none;
    overflow-y: auto;
    padding: 8px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .left-container textarea:focus {
    border-color: #4f46e5;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 10px;
    font-size: 0.85rem;
    color: #555;
  }
  .toggle-row input[type="checkbox"] {
    appearance: none;
    width: 2.5rem;
    height: 1.25rem;
    background: #ccc;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    flex-shrink: 0;
  }
  .toggle-row input[type="checkbox"]::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 1rem;
    height: 1rem;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-row input[type="checkbox"]:checked {
    background: #4f46e5;
  }
  .toggle-row input[type="checkbox"]:checked::after {
    transform: translateX(1.25rem);
  }
  button {
    align-self: flex-end;
    padding: 10px 20px;
    border: none;
    background: #4f46e5;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-family: "Fira Code", Consolas, monospace;
    font-size: 16px;
    transition: background 0.2s;
  }
  button:hover { background: #4338ca; }
  button:disabled { background: #a5b4fc; cursor: not-allowed; }
  .right-container {
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow-y: auto;
  }
  .error {
    color: #dc2626;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
  .emoji-big {
    font-size: 5rem;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .label { color: #666; font-size: 0.85rem; }
  .llm-badge {
    display: inline-block;
    background: #fef3c7;
    color: #92400e;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .candidates {
    margin-top: 1rem;
    text-align: left;
    width: 100%;
  }
  .candidates h3 { font-size: 0.95rem; margin-bottom: 0.5rem; color: #444; }
  .candidate {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.4rem 0;
    border-bottom: 1px solid #eee;
  }
  .candidate:last-child { border-bottom: none; }
  .candidate .ce { font-size: 1.3rem; margin-right: 0.5rem; }
  .candidate .desc { flex: 1; font-size: 0.85rem; color: #555; }
  .candidate .score {
    font-size: 0.8rem;
    color: #888;
    font-variant-numeric: tabular-nums;
  }
  .placeholder {
    color: #999;
    font-size: 0.9rem;
  }
  .bottom-container {
    width: 100%;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .bottom-container h4 {
    margin-bottom: 0.5rem;
    font-size: 1rem;
  }
  .bottom-container p {
    font-size: 0.85rem;
    color: #555;
    line-height: 1.5;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading {
    width: 2rem;
    height: 2rem;
    border: 3px solid #e0e0e0;
    border-top-color: #4f46e5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 2rem auto;
  }
</style>
</head>
<body>
<div class="page-wrapper">
  <h1 class="page-title">Emoji-Generator</h1>
  <div class="main-container">
    <div class="left-container">
      <textarea id="inputText" placeholder="Gib deinen Satz ein ..."></textarea>
      <div class="toggle-row">
        <input type="checkbox" id="toggleLLM" checked />
        <label for="toggleLLM">🤖 LLM-Optimierung (qwen2.5:0.5b)</label>
      </div>
      <button id="btnRecommend" onclick="recommend()">OK</button>
    </div>
    <div class="right-container">
      <div id="error" class="error"></div>
      <div id="result">
        <p class="placeholder">Hier ist dein Satz mit passendem Emoji ...</p>
      </div>
    </div>
  </div>
  <div class="bottom-container">
    <h4>Hinweis:</h4>
    <p>Gib deinen Satz ein und lass dir das passende Emoji vom Emoji-Generator ausgeben.</p>
    <p>Ergebnisse basieren auf semantischer Suche (Embeddings) und optionaler KI-Verfeinerung (Ollama / qwen2.5:0.5b).</p>
  </div>
</div>

<script>
const input = document.getElementById('inputText');
const btn = document.getElementById('btnRecommend');
const toggleLLM = document.getElementById('toggleLLM');
const resultDiv = document.getElementById('result');
const errorDiv = document.getElementById('error');

input.addEventListener('keydown', e => { if (e.key === 'Enter') recommend(); });

async function recommend() {
  const text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  errorDiv.textContent = '';
  resultDiv.innerHTML = '<div class="loading"></div>';

  try {
    const res = await fetch('http://localhost:8000/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, use_llm: toggleLLM.checked }),
    });

    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`Server-Fehler (${res.status}): ${errBody}`);
    }

    const data = await res.json();
    displayResult(data);
  } catch (err) {
    errorDiv.textContent = 'Fehler: ' + err.message;
    resultDiv.innerHTML = '<p class="placeholder">Hier ist dein Satz mit passendem Emoji ...</p>';
  } finally {
    btn.disabled = false;
  }
}

function displayResult(data) {
  let html = '';

  if (data.llm_used) {
    html += '<span class="llm-badge">🤖 LLM optimiert</span>';
  }

  html += `<div class="emoji-big">${data.recommended}</div>`;
  html += `<p class="label">Empfohlenes Emoji</p>`;

  if (data.all_candidates && data.all_candidates.length > 0) {
    html += '<div class="candidates"><h3>Top-Kandidaten</h3>';
    data.all_candidates.forEach(c => {
      const pct = (c.score * 100).toFixed(1);
      html += `<div class="candidate">
        <span class="ce">${c.emoji}</span>
        <span class="desc">${escapeHtml(c.description)}</span>
        <span class="score">${pct}%</span>
      </div>`;
    });
    html += '</div>';
  }

  resultDiv.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
